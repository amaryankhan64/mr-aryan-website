<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mr Aryan Resume Service</title>

<style>
:root {
  --bg:#020617;
  --accent:#22c55e;
  --text:#e5e7eb;
}

body{
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top,#064e3b 0,#020617 60%,#000 100%);
  color:var(--text);
}

/* HEADER */
header{
  background:#0f172a;
  padding:12px 20px;
  display:flex;
  align-items:center;
  gap:10px;
}

header img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

/* ✅ STICKY PROFILE */
.sticky-profile{
  position:fixed;
  top:20px;
  right:-250px;
  display:flex;
  align-items:center;
  gap:10px;
  background:#0f172a;
  padding:8px 14px;
  border-radius:30px;
  transition:0.4s ease;
  z-index:9999;
}

.sticky-profile img{
  width:40px;
  height:40px;
  border-radius:50%;
}

.sticky-profile span{
  font-size:14px;
  font-weight:600;
  color:#fff;
}

.sticky-show{
  right:20px;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px;
}

/* GLOW */
.hero-img{
  width:180px;
  height:180px;
  border-radius:50%;
  object-fit:cover;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  0% { box-shadow:0 0 10px #22c55e; }
  100% { box-shadow:0 0 40px #22c55e; }
}

.hero-title{
  font-size:2.5rem;
  font-weight:800;
  margin-top:20px;
  animation: fadeUp 1s ease;
}

.hero-text{
  margin-top:15px;
  line-height:1.8;
  color:#cbd5f5;
  animation: fadeUp 1.5s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

.btn{
  display:inline-block;
  padding:12px 22px;
  margin:8px;
  border-radius:30px;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.btn-primary{
  background:#22c55e;
  color:black;
}

.btn:hover{
  transform:scale(1.1);
}

.section{
  margin-top:70px;
}

.section-title{
  text-align:center;
  color:#22c55e;
  font-size:24px;
}

.service-card{
  max-width:900px;
  margin:20px auto;
  background:#0f172a;
  padding:25px;
  border-radius:15px;
}

.resume-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.resume-card{
  background:#020617;
  padding:10px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.resume-card:hover{
  transform:scale(1.08);
  box-shadow:0 0 15px #22c55e;
}

.resume-card img{
  width:100%;
  height:auto;
  object-fit:contain;
  border-radius:10px;
}

.modal{
  display:none;
  position:fixed;
  z-index:999;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  text-align:center;
}

.modal img{
  max-width:90%;
  max-height:80vh;
  margin-top:50px;
}

.close{
  position:absolute;
  top:20px;
  right:40px;
  font-size:40px;
  color:white;
  cursor:pointer;
}

#whatsappBtn{
  display:inline-block;
  margin-top:20px;
  background:#22c55e;
  padding:12px 20px;
  border-radius:8px;
  text-decoration:none;
  color:black;
  font-weight:bold;
}

.social{
  text-align:center;
  margin-top:80px;
}

.social a{
  display:inline-block;
  margin:10px;
  padding:12px 18px;
  border-radius:8px;
  color:white;
  text-decoration:none;
}

.instagram{background:#d6249f;}
.whatsapp{background:#25D366;}
.facebook{background:#1877F2;}
.linkedin{background:#0A66C2;}

footer{
  text-align:center;
  margin-top:40px;
  padding:20px;
  color:gray;
}
</style>
</head>

<body>

<header>
  <img src="https://i.postimg.cc/HksD78PV/my-photo.jpg">
  <b>Mr Aryan Resume Expert</b>
</header>

<!-- ✅ STICKY PROFILE -->
<div class="sticky-profile" id="stickyProfile">
  <img src="https://i.postimg.cc/HksD78PV/my-photo.jpg">
  <span>Mr Aryan Resume</span>
</div>

<section class="hero">
  <img src="https://i.postimg.cc/HksD78PV/my-photo.jpg" class="hero-img">

  <div class="hero-title">Mr Aryan Resume Expert</div>

  <div class="hero-text">
    💼 Expert Resume & LinkedIn Optimization <br>
    ✨ Trusted by 2,000+ Job Seekers Worldwide <br>
    🚀 Get Hired Faster with a Powerful Profile
  </div>

  <a href="https://wa.me/917404836378" class="btn btn-primary">Get Started</a>
</section>

<!-- ✅ REST SAME (तुम्हारा पूरा original code untouched) -->

<script>
function openPreview(img,type){
  document.getElementById("previewModal").style.display="block";
  document.getElementById("modalImg").src=img;

  let msg = "Hi, I want this " + type;
  document.getElementById("whatsappBtn").href =
  "https://wa.me/917404836378?text=" + encodeURIComponent(msg);
}

function closeModal(){
  document.getElementById("previewModal").style.display="none";
}

window.onclick = function(e){
  let modal = document.getElementById("previewModal");
  if(e.target === modal){
    modal.style.display = "none";
  }
}

/* ✅ STICKY LOGIC */
window.addEventListener("scroll", function(){
  let sticky = document.getElementById("stickyProfile");

  if(window.scrollY > 120){
    sticky.classList.add("sticky-show");
  } else {
    sticky.classList.remove("sticky-show");
  }
});
</script>

</body>
</html>
